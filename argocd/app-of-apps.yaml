apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rhoai-platform-ops
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/davidseve/rhoai-platform-ops.git
    targetRevision: feat/enhanced-dashboards
    path: argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
