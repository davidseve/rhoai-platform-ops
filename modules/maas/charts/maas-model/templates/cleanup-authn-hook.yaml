{{- if eq .Values.mode "llminferenceservice" }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: patch-gateway-authn
  namespace: {{ .Values.llminferenceservice.gateway.namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: patch-gateway-authn
  namespace: {{ .Values.llminferenceservice.gateway.namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
rules:
- apiGroups: ["kuadrant.io"]
  resources: ["authpolicies"]
  verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: patch-gateway-authn
  namespace: {{ .Values.llminferenceservice.gateway.namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
subjects:
- kind: ServiceAccount
  name: patch-gateway-authn
  namespace: {{ .Values.llminferenceservice.gateway.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: patch-gateway-authn
---
apiVersion: batch/v1
kind: Job
metadata:
  name: patch-gateway-authn
  namespace: {{ .Values.llminferenceservice.gateway.namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 120
  template:
    spec:
      serviceAccountName: patch-gateway-authn
      restartPolicy: Never
      containers:
      - name: patch
        image: registry.redhat.io/openshift4/ose-cli:latest
        command:
        - /bin/bash
        - -c
        - |
          set -euo pipefail
          POLICY="{{ .Values.llminferenceservice.gateway.name }}-authn"
          NS="{{ .Values.llminferenceservice.gateway.namespace }}"

          echo "Waiting for $POLICY to exist..."
          for i in $(seq 1 12); do
            if oc get authpolicy "$POLICY" -n "$NS" &>/dev/null; then break; fi
            echo "  attempt $i/12"; sleep 5
          done

          echo "Patching $POLICY with MaaS audience + tier resolution..."
          oc patch authpolicy "$POLICY" -n "$NS" --type=merge -p '{
            "spec": {
              "rules": {
                "authentication": {
                  "service-accounts": {
                    "kubernetesTokenReview": {
                      "audiences": ["https://kubernetes.default.svc", "{{ .Values.llminferenceservice.gateway.name }}-sa"]
                    },
                    "cache": {
                      "key": {"selector": "context.request.http.headers.authorization.@case:lower"},
                      "ttl": 600
                    },
                    "defaults": {
                      "userid": {"expression": "auth.identity.user.username.split(\":\")[3]"}
                    },
                    "metrics": false,
                    "priority": 0
                  }
                },
                "authorization": {
                  "tier-access": {
                    "kubernetesSubjectAccessReview": {
                      "authorizationGroups": {"expression": "auth.identity.user.groups"},
                      "resourceAttributes": {
                        "group": {"value": "serving.kserve.io"},
                        "name": {"expression": "request.path.split(\"/\")[2]"},
                        "namespace": {"expression": "request.path.split(\"/\")[1]"},
                        "resource": {"value": "llminferenceservices"},
                        "verb": {"value": "post"}
                      },
                      "user": {"expression": "auth.identity.user.username"}
                    },
                    "cache": {
                      "key": {"selector": "{auth.identity.user.username}:{request.path}"},
                      "ttl": 60
                    },
                    "metrics": false,
                    "priority": 0
                  }
                },
                "metadata": {
                  "matchedTier": {
                    "http": {
                      "url": "https://maas-api.redhat-ods-applications.svc.cluster.local:8443/v1/tiers/lookup",
                      "method": "POST",
                      "contentType": "application/json",
                      "body": {"expression": "{ \"groups\": auth.identity.user.groups }"}
                    },
                    "cache": {
                      "key": {"selector": "auth.identity.user.username"},
                      "ttl": 300
                    },
                    "metrics": false,
                    "priority": 0
                  }
                },
                "response": {
                  "success": {
                    "filters": {
                      "identity": {
                        "json": {
                          "properties": {
                            "tier": {"expression": "auth.metadata.matchedTier[\"tier\"]"},
                            "userid": {"expression": "auth.identity.userid"}
                          }
                        },
                        "metrics": false,
                        "priority": 0
                      }
                    }
                  }
                }
              }
            }
          }'

          echo "Verifying patch applied..."
          AUDIENCES=$(oc get authpolicy "$POLICY" -n "$NS" \
            -o jsonpath='{.spec.rules.authentication.service-accounts.kubernetesTokenReview.audiences}')
          echo "Audiences: $AUDIENCES"

          TIER=$(oc get authpolicy "$POLICY" -n "$NS" \
            -o jsonpath='{.spec.rules.metadata.matchedTier.http.url}')
          echo "Tier lookup URL: $TIER"
          echo "Done."
{{- end }}
