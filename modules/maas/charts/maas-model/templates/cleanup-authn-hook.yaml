{{- if .Values.llminferenceservice.gateway }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: patch-gateway-authn
  namespace: {{ .Values.llminferenceservice.gateway.namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: patch-gateway-authn
  namespace: {{ .Values.llminferenceservice.gateway.namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
rules:
- apiGroups: ["kuadrant.io"]
  resources: ["authpolicies"]
  verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: patch-gateway-authn
  namespace: {{ .Values.llminferenceservice.gateway.namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
subjects:
- kind: ServiceAccount
  name: patch-gateway-authn
  namespace: {{ .Values.llminferenceservice.gateway.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: patch-gateway-authn
---
apiVersion: batch/v1
kind: Job
metadata:
  name: patch-gateway-authn
  namespace: {{ .Values.llminferenceservice.gateway.namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 120
  template:
    spec:
      serviceAccountName: patch-gateway-authn
      restartPolicy: Never
      containers:
      - name: patch
        image: {{ .Values.images.ocCli }}
        command:
        - /bin/bash
        - -c
        - |
          set -euo pipefail
          GW_NAME="{{ .Values.llminferenceservice.gateway.name }}"
          NS="{{ .Values.llminferenceservice.gateway.namespace }}"

          echo "Waiting for AuthPolicies targeting $GW_NAME..."
          POLICIES=""
          for i in $(seq 1 24); do
            for ap in $(oc get authpolicy -n "$NS" -o name 2>/dev/null); do
              TARGET=$(oc get "$ap" -n "$NS" -o jsonpath='{.spec.targetRef.name}' 2>/dev/null || true)
              if [ "$TARGET" = "$GW_NAME" ]; then
                POLICIES="${POLICIES} ${ap#*/}"
              fi
            done
            if [ -n "$POLICIES" ]; then break; fi
            echo "  attempt $i/24 - no AuthPolicy found yet"; sleep 10
          done

          if [ -z "$POLICIES" ]; then
            echo "ERROR: No AuthPolicy targeting $GW_NAME found after 4 minutes"
            exit 1
          fi
          echo "Found AuthPolicies:$POLICIES"

          PATCH='{
            "spec": {
              "rules": {
                "authentication": {
                  "service-accounts": {
                    "kubernetesTokenReview": {
                      "audiences": ["https://kubernetes.default.svc", "{{ .Values.llminferenceservice.gateway.name }}-sa"]
                    },
                    "cache": {
                      "key": {"selector": "context.request.http.headers.authorization.@case:lower"},
                      "ttl": 600
                    },
                    "defaults": {
                      "userid": {"expression": "auth.identity.user.username.split(\":\")[3]"}
                    },
                    "metrics": false,
                    "priority": 0
                  }
                },
                "authorization": {
                  "tier-access": {
                    "kubernetesSubjectAccessReview": {
                      "authorizationGroups": {"expression": "auth.identity.user.groups"},
                      "resourceAttributes": {
                        "group": {"value": "serving.kserve.io"},
                        "name": {"expression": "request.path.split(\"/\")[2]"},
                        "namespace": {"expression": "request.path.split(\"/\")[1]"},
                        "resource": {"value": "llminferenceservices"},
                        "verb": {"value": "post"}
                      },
                      "user": {"expression": "auth.identity.user.username"}
                    },
                    "cache": {
                      "key": {"selector": "{auth.identity.user.username}:{request.path}"},
                      "ttl": 60
                    },
                    "metrics": false,
                    "priority": 0
                  }
                },
                "metadata": {
                  "matchedTier": {
                    "http": {
                      "url": "https://maas-api.redhat-ods-applications.svc.cluster.local:8443/v1/tiers/lookup",
                      "method": "POST",
                      "contentType": "application/json",
                      "body": {"expression": "{ \"groups\": auth.identity.user.groups }"}
                    },
                    "cache": {
                      "key": {"selector": "auth.identity.user.username"},
                      "ttl": 300
                    },
                    "metrics": false,
                    "priority": 0
                  }
                },
                "response": {
                  "success": {
                    "filters": {
                      "identity": {
                        "json": {
                          "properties": {
                            "tier": {"expression": "auth.metadata.matchedTier[\"tier\"]"},
                            "userid": {"expression": "auth.identity.userid"}
                          }
                        },
                        "metrics": false,
                        "priority": 0
                      }
                    }
                  }
                }
              }
            }
          }'

          for POLICY in $POLICIES; do
            echo "Patching $POLICY..."
            oc patch authpolicy "$POLICY" -n "$NS" --type=merge -p "$PATCH"
          done

          echo "Verifying patch applied..."
          for POLICY in $POLICIES; do
            AUDIENCES=$(oc get authpolicy "$POLICY" -n "$NS" \
              -o jsonpath='{.spec.rules.authentication.service-accounts.kubernetesTokenReview.audiences}')
            echo "  $POLICY audiences: $AUDIENCES"
          done
          echo "Done."
{{- end }}
