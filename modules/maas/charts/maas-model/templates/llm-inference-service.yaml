apiVersion: serving.kserve.io/v1alpha1
kind: LLMInferenceService
metadata:
  name: {{ .Values.global.name }}
  namespace: {{ .Values.global.namespace }}
  annotations:
    alpha.maas.opendatahub.io/tiers: {{ keys .Values.tiers | sortAlpha | toJson | quote }}
    security.opendatahub.io/enable-auth: "true"
spec:
  model:
    name: {{ .Values.model.servedName }}
    uri: {{ .Values.model.storageUri }}
  replicas: {{ .Values.llminferenceservice.replicas }}
  router:
    gateway:
      refs:
      - name: {{ .Values.llminferenceservice.gateway.name }}
        namespace: {{ .Values.llminferenceservice.gateway.namespace }}
    route: {}
  template:
    containers:
    - name: main
      image: {{ .Values.images.vllm.repository }}:{{ .Values.images.vllm.tag }}
      command:
      - python
      - -m
      - vllm.entrypoints.openai.api_server
      args:
      - --model
      - /mnt/models
      - --port
      - "8000"
      - --max-model-len
      - {{ .Values.model.maxModelLen | quote }}
      - --served-model-name
      - {{ .Values.model.servedName }}
      - --ssl-certfile
      - /var/run/kserve/tls/tls.crt
      - --ssl-keyfile
      - /var/run/kserve/tls/tls.key
      {{- if .Values.tracing.enabled }}
      - --otlp-traces-endpoint
      - {{ .Values.tracing.otlpEndpoint | quote }}
      {{- if .Values.tracing.detailed }}
      - --collect-detailed-traces
      - request
      {{- end }}
      env:
        - name: OTEL_SERVICE_NAME
          value: {{ .Values.tracing.serviceName | default .Values.model.servedName | quote }}
      {{- end }}
      resources:
        limits:
          cpu: {{ .Values.resources.limits.cpu | quote }}
          memory: {{ .Values.resources.limits.memory | quote }}
        requests:
          cpu: {{ .Values.resources.requests.cpu | quote }}
          memory: {{ .Values.resources.requests.memory | quote }}
