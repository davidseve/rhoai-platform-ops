global:
  name: tinyllama-test
  namespace: maas-models

mode: llminferenceservice

namespace:
  create: true

model:
  storageUri: "oci://quay.io/rh-aiservices-bu/tinyllama:1.0"
  servedName: "tinyllama-test"
  maxModelLen: 2048

images:
  vllm:
    # CPU: quay.io/rh-aiservices-bu/vllm-cpu-openai-ubi9:0.3
    # GPU: quay.io/modh/vllm:rhoai-2.20-cuda (default llm-d image)
    repository: "quay.io/rh-aiservices-bu/vllm-cpu-openai-ubi9"
    tag: "0.3"
  ocCli: "registry.redhat.io/openshift4/ose-cli:latest"

resources:
  requests:
    cpu: "2"
    memory: "4Gi"
  limits:
    cpu: "8"
    memory: "8Gi"

llminferenceservice:
  replicas: 1
  gateway:
    name: maas-default-gateway
    namespace: openshift-ingress

tracing:
  enabled: false
  otlpEndpoint: "http://maas-collector-collector.observability.svc:4317"
  serviceName: ""   # defaults to model servedName

rbac:
  enabled: true

# Tier definitions: key = tier name, used to derive LLMInferenceService annotation,
# RBAC group bindings, RateLimitPolicy, and TokenRateLimitPolicy.
# Tier names must match those in maas-platform/values.yaml (the cross-chart contract).
tiers:
  free:
    requestRates:
      - limit: 10
        window: 1m
    tokenRates:
      - limit: 5000
        window: 1m
  premium:
    requestRates:
      - limit: 50
        window: 1m
    tokenRates:
      - limit: 50000
        window: 1m
