datasciencecluster:
  name: default-dsc
  components:
    dashboard:
      managementState: Managed
    kserve:
      managementState: Managed
    llamastackoperator:
      managementState: Managed
    modelsAsService:
      managementState: Managed
    aipipelines:
      managementState: Removed
    feastoperator:
      managementState: Removed
    kueue:
      managementState: Removed
    mlflowoperator:
      managementState: Removed
    modelregistry:
      managementState: Removed
    ray:
      managementState: Removed
    trainer:
      managementState: Removed
    trainingoperator:
      managementState: Removed
    trustyai:
      managementState: Removed
    workbenches:
      managementState: Removed

dashboard:
  genAiStudio: true
  modelAsService: true

gateway:
  enabled: true
  name: maas-default-gateway
  namespace: openshift-ingress
  className: openshift-default
  authPolicyName: maas-default-gateway-authn
  # TLS secret for the Gateway listener.
  # passthrough mode (default): use the cluster wildcard cert
  #   bare-metal: router-certs-default
  #   AWS: ingress-certs
  # reencrypt mode: use a service-ca generated cert
  #   annotate the gateway svc with service.beta.openshift.io/serving-cert-secret-name
  #   e.g. maas-gateway-service-tls
  tlsSecretName: ingress-certs
  modelNamespaces:
    - maas-models

route:
  enabled: true
  name: maas-default-gateway
  namespace: openshift-ingress
  # Custom hostname for the Route (e.g. maas.apps.cluster.example.com).
  # Leave empty to let OpenShift generate a default hostname.
  host: ""
  # passthrough (default): TLS goes directly from client to Gateway.
  #   Requires gateway.tlsSecretName to be the wildcard cert for *.apps.<clusterDomain>.
  # reencrypt: router terminates external TLS, re-encrypts to Gateway with service-ca cert.
  #   Requires gateway.tlsSecretName to be a service-ca cert + annotation on the svc.
  tlsTermination: passthrough

# Limitador configuration
limitador:
  # Enables limit_name labels on authorized metrics (not just limited_calls)
  exhaustiveTelemetry: true

# Tier definitions: mapped to tier-to-group-mapping ConfigMap + OpenShift Groups.
# Tier names (free, premium) are the cross-chart contract with maas-model/values.yaml,
# which defines per-tier rate limits (RateLimitPolicy / TokenRateLimitPolicy).
tiers:
  - name: free
    displayName: "Free"
    level: 0
    groups:
      - name: system:authenticated

  - name: premium
    displayName: "Premium"
    level: 1
    groups:
      - name: tier-premium-users
        users: []

# TelemetryPolicy: enriches Limitador metrics with user/group/model labels
telemetry:
  enabled: true

# ServiceMonitor for Limitador metrics scraping
monitoring:
  enabled: true
  scrapeInterval: 30s
  vllm:
    enabled: true
    modelNamespace: maas-models

# PrometheusRule alerts for rate limit health
alerting:
  enabled: true
  rejectionRateThreshold: 0.3

# GrafanaDashboard CRs (requires Grafana Operator CRDs)
grafana:
  enabled: false
  instanceSelector:
    dashboards: "grafana"
