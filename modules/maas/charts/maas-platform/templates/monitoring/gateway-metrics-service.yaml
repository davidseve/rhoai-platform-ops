{{- if .Values.monitoring.gatewayMetrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: gateway-api-state-metrics
  namespace: {{ .Values.monitoring.gatewayMetrics.namespace | default "observability" }}
  labels:
    app.kubernetes.io/name: gateway-api-state-metrics
    app.kubernetes.io/component: metrics
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: gateway-api-state-metrics
  ports:
  - name: metrics
    port: 8080
    targetPort: metrics
    protocol: TCP
  - name: telemetry
    port: 8081
    targetPort: telemetry
    protocol: TCP
{{- end }}
