{{- if .Values.monitoring.gatewayMetrics.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gateway-api-state-metrics
  labels:
    app.kubernetes.io/name: gateway-api-state-metrics
    app.kubernetes.io/component: metrics
rules:
# Gateway API resources
- apiGroups: ["gateway.networking.k8s.io"]
  resources:
    - gateways
    - gatewayclasses
    - httproutes
    - grpcroutes
  verbs: ["list", "watch"]
# Kuadrant policy resources
- apiGroups: ["kuadrant.io"]
  resources:
    - authpolicies
    - ratelimitpolicies
    - tlspolicies
    - dnspolicies
  verbs: ["list", "watch"]
# kube-state-metrics discovers CRDs before watching custom resources
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["list", "watch"]
# kube-state-metrics needs authentication/authorization
- apiGroups: ["authentication.k8s.io"]
  resources: ["tokenreviews"]
  verbs: ["create"]
- apiGroups: ["authorization.k8s.io"]
  resources: ["subjectaccessreviews"]
  verbs: ["create"]
{{- end }}
