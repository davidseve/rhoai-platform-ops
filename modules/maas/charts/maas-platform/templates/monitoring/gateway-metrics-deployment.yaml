{{- if .Values.monitoring.gatewayMetrics.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-api-state-metrics
  namespace: {{ .Values.monitoring.gatewayMetrics.namespace | default "observability" }}
  labels:
    app.kubernetes.io/name: gateway-api-state-metrics
    app.kubernetes.io/component: metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway-api-state-metrics
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway-api-state-metrics
        app.kubernetes.io/component: metrics
    spec:
      serviceAccountName: gateway-api-state-metrics
      containers:
      - name: kube-state-metrics
        image: {{ .Values.monitoring.gatewayMetrics.image | default "registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.14.0" }}
        args:
        - --custom-resource-state-config-file=/config/custom-resource-state.yaml
        - --custom-resource-state-only=true
        ports:
        - name: metrics
          containerPort: 8080
          protocol: TCP
        - name: telemetry
          containerPort: 8081
          protocol: TCP
        volumeMounts:
        - name: config
          mountPath: /config
          readOnly: true
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          timeoutSeconds: 5
      volumes:
      - name: config
        configMap:
          name: gateway-api-state-metrics
{{- end }}
