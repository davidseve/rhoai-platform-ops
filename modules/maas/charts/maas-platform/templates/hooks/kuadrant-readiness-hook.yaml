apiVersion: v1
kind: ServiceAccount
metadata:
  name: kuadrant-readiness-check
  namespace: kuadrant-system
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kuadrant-readiness-check
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
rules:
  - apiGroups: ["kuadrant.io"]
    resources: ["kuadrants"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "delete", "get"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["patch"]
  - apiGroups: ["operator.authorino.kuadrant.io"]
    resources: ["authorinos"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kuadrant-readiness-check
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
subjects:
  - kind: ServiceAccount
    name: kuadrant-readiness-check
    namespace: kuadrant-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kuadrant-readiness-check
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kuadrant-readiness-check
  namespace: kuadrant-system
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 600
  template:
    spec:
      serviceAccountName: kuadrant-readiness-check
      restartPolicy: Never
      containers:
        - name: check
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              echo "Waiting for Kuadrant CR to exist..."
              for i in $(seq 1 30); do
                if oc get kuadrant kuadrant -n kuadrant-system &>/dev/null; then
                  break
                fi
                echo "  attempt $i/30 - Kuadrant CR not found yet"
                sleep 10
              done

              echo "Checking Kuadrant readiness..."
              for i in $(seq 1 30); do
                READY=$(oc get kuadrant kuadrant -n kuadrant-system \
                  -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "Unknown")
                REASON=$(oc get kuadrant kuadrant -n kuadrant-system \
                  -o jsonpath='{.status.conditions[?(@.type=="Ready")].reason}' 2>/dev/null || echo "Unknown")

                echo "  attempt $i/30 - Ready=$READY Reason=$REASON"

                if [ "$READY" = "True" ]; then
                  echo "Kuadrant is ready."
                  break
                fi

                if [ "$REASON" = "MissingDependency" ]; then
                  echo "Kuadrant stuck in MissingDependency - restarting operator pod..."
                  oc delete pod -n kuadrant-system \
                    -l app.kubernetes.io/component=manager,app.kubernetes.io/name=kuadrant-operator \
                    --ignore-not-found=true 2>/dev/null || true
                  oc delete pod -n kuadrant-system \
                    -l control-plane=controller-manager \
                    --ignore-not-found=true 2>/dev/null || true
                  echo "Operator pod restarted. Waiting for reconciliation..."
                  sleep 30
                  continue
                fi

                sleep 10
              done

              if [ "$READY" != "True" ]; then
                echo "ERROR: Kuadrant did not become ready within timeout"
                exit 1
              fi

              echo ""
              echo "=== Setting up Authorino TLS (official method) ==="
              echo "Reference: opendatahub-io/models-as-a-service scripts/setup-authorino-tls.sh"
              echo ""

              NS=kuadrant-system
              SVC=authorino-authorino-authorization
              CERT_SECRET=authorino-server-cert
              CA_MOUNT=/etc/ssl/certs/openshift-service-ca

              # --- Step 1: Annotate service for serving cert generation ---
              echo "Step 1: Annotating $SVC for serving cert..."
              oc annotate service "$SVC" -n "$NS" \
                "service.beta.openshift.io/serving-cert-secret-name=$CERT_SECRET" \
                --overwrite

              # --- Step 2: Enable listener TLS on Authorino CR ---
              echo "Step 2: Enabling listener TLS on Authorino CR..."
              oc patch authorino authorino -n "$NS" --type=merge -p '{
                "spec": {
                  "listener": {
                    "tls": {
                      "enabled": true,
                      "certSecretRef": {
                        "name": "'"$CERT_SECRET"'"
                      }
                    }
                  },
                  "volumes": {
                    "items": [{
                      "name": "service-ca",
                      "configMaps": ["openshift-service-ca.crt"],
                      "mountPath": "'"$CA_MOUNT"'"
                    }]
                  }
                }
              }'

              # --- Step 3: Set env vars for outbound service-ca trust ---
              echo "Step 3: Setting SSL_CERT_FILE on Authorino deployment..."
              CA_FILE="$CA_MOUNT/service-ca.crt"

              oc set env deployment/authorino -n "$NS" \
                "SSL_CERT_FILE=$CA_FILE" \
                "REQUESTS_CA_BUNDLE=$CA_FILE"

              # --- Step 4: Restart Limitador and wait for rollouts ---
              echo ""
              echo "=== Restarting Limitador and waiting for rollouts ==="
              echo ""

              echo "Restarting Limitador pods..."
              oc delete pod -n "$NS" \
                -l limitador-resource=limitador,app=limitador \
                --ignore-not-found=true 2>/dev/null || true

              sleep 5

              echo "Waiting for Authorino rollout..."
              oc rollout status deployment/authorino -n "$NS" --timeout=180s 2>/dev/null || \
                echo "WARNING: Authorino rollout status check failed"

              echo "Waiting for Limitador rollout..."
              oc rollout status deployment/limitador-limitador -n "$NS" --timeout=120s 2>/dev/null || \
                echo "WARNING: Limitador rollout status check failed"

              # --- Step 5: Restart Envoy Gateway pods ---
              # Envoy must reload the WasmPlugin config after Authorino/Limitador changes.
              echo ""
              echo "=== Restarting Envoy Gateway pods ==="
              GW_NS={{ .Values.gateway.namespace | quote }}
              GW_NAME={{ .Values.gateway.name | quote }}
              GW_LABEL="gateway.networking.k8s.io/gateway-name=$GW_NAME"

              if oc get pods -n "$GW_NS" -l "$GW_LABEL" --no-headers 2>/dev/null | grep -q .; then
                oc delete pod -n "$GW_NS" -l "$GW_LABEL" --ignore-not-found 2>/dev/null || true
                sleep 10
                echo "Waiting for Envoy Gateway rollout..."
                DEPLOY=$(oc get deployment -n "$GW_NS" -l "$GW_LABEL" -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
                if [ -n "$DEPLOY" ]; then
                  oc rollout status "deployment/$DEPLOY" -n "$GW_NS" --timeout=120s 2>/dev/null || \
                    echo "WARNING: Envoy rollout status check timed out"
                fi
              else
                echo "No Envoy Gateway pods found (gateway may not be deployed yet)"
              fi

              echo ""
              echo "=== Kuadrant stack ready with official TLS configuration ==="
