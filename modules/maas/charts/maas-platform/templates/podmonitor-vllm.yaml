{{- if .Values.monitoring.vllm.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: vllm-metrics
  namespace: {{ .Values.monitoring.vllm.modelNamespace }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  selector:
    matchLabels:
      component: predictor
  podMetricsEndpoints:
    - port: user-port
      path: /metrics
      interval: {{ .Values.monitoring.scrapeInterval | default "30s" }}
      scheme: https
      tlsConfig:
        ca:
          configMap:
            name: serving-certs-ca-bundle
            key: service-ca.crt
{{- end }}
