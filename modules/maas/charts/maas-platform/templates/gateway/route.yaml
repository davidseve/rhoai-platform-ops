{{- if .Values.route.enabled }}
{{- $host := .Values.route.host -}}
{{- if not $host -}}
  {{- $ingress := (lookup "config.openshift.io/v1" "Ingress" "" "cluster") -}}
  {{- if $ingress -}}
    {{- $host = printf "maas.%s" $ingress.spec.domain -}}
  {{- end -}}
{{- end -}}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ .Values.route.name }}
  namespace: {{ .Values.route.namespace }}
  {{- if eq .Values.route.tlsTermination "reencrypt" }}
  annotations:
    router.openshift.io/service-ca-certificate: "true"
  {{- end }}
spec:
  {{- if $host }}
  host: {{ $host }}
  {{- end }}
  port:
    targetPort: 443
  tls:
    termination: {{ .Values.route.tlsTermination }}
    {{- if eq .Values.route.tlsTermination "reencrypt" }}
    insecureEdgeTerminationPolicy: Redirect
    {{- end }}
  to:
    kind: Service
    name: {{ .Values.gateway.name }}-{{ .Values.gateway.className }}
    weight: 100
  wildcardPolicy: None
{{- end }}
