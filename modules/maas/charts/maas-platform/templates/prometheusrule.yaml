{{- if .Values.alerting.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: maas-alerts
  namespace: kuadrant-system
  labels:
    app: limitador
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  groups:
    - name: maas-rate-limits
      rules:
        - alert: MaaSLimitadorDown
          expr: limitador_up == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Limitador is down"
            description: "Limitador rate limiter has been down for more than 1 minute."

        - alert: MaaSHighRejectionRate
          expr: |
            (
              rate(limited_calls[5m])
              / (rate(authorized_calls[5m]) + rate(limited_calls[5m]))
            ) > {{ .Values.alerting.rejectionRateThreshold | default 0.3 }}
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High rate limit rejection rate"
            description: "More than {{ mul (int (.Values.alerting.rejectionRateThreshold | default 0.3)) 100 | default 30 }}% of requests are being rate limited on {{ "{{ $labels.limitador_namespace }}" }}."

        - alert: MaaSDatastorePartitioned
          expr: datastore_partitioned == 1
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Limitador datastore partitioned"
            description: "Limitador has lost connectivity to its backing datastore."

    - name: maas-gateway-errors
      rules:
        - alert: MaaSGateway5xxErrors
          expr: |
            sum(rate(
              haproxy_server_http_responses_total{route="data-science-gateway", code="5xx"}
            [5m])) > 0
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "MaaS gateway returning 5xx errors"
            description: "The MaaS gateway is returning server errors at {{ "{{ $value | humanize }}" }} req/s. Check Kuadrant/Authorino logs for auth evaluation failures."

        - alert: MaaSGateway5xxCritical
          expr: |
            sum(rate(
              haproxy_server_http_responses_total{route="data-science-gateway", code="5xx"}
            [5m]))
            / sum(rate(
              haproxy_server_http_responses_total{route="data-science-gateway"}
            [5m])) > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "MaaS gateway 5xx rate exceeds 5%"
            description: "More than 5% of gateway requests are returning server errors. Possible auth service overload or backend failure."
{{- end }}
