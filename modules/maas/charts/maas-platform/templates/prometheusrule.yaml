{{- if .Values.alerting.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: maas-alerts
  namespace: kuadrant-system
  labels:
    app: limitador
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  groups:
    - name: maas-rate-limits
      rules:
        - alert: MaaSLimitadorDown
          expr: limitador_up == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Limitador is down"
            description: "Limitador rate limiter has been down for more than 1 minute."

        - alert: MaaSHighRejectionRate
          expr: |
            (
              rate(limited_calls[5m])
              / (rate(authorized_calls[5m]) + rate(limited_calls[5m]))
            ) > {{ .Values.alerting.rejectionRateThreshold | default 0.3 }}
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High rate limit rejection rate"
            description: "More than {{ mul (int (.Values.alerting.rejectionRateThreshold | default 0.3)) 100 | default 30 }}% of requests are being rate limited on {{ "{{ $labels.limitador_namespace }}" }}."

        - alert: MaaSDatastorePartitioned
          expr: datastore_partitioned == 1
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Limitador datastore partitioned"
            description: "Limitador has lost connectivity to its backing datastore."

    - name: maas-gateway-errors
      rules:
        - alert: MaaSGatewayAuthTimeout
          expr: |
            sum(rate(kuadrant_errors[5m])) > 0
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "MaaS gateway auth timeout (WASM 200ms limit)"
            description: "The Kuadrant WASM filter is timing out at {{ "{{ $value | humanize }}" }} req/s. Auth evaluation exceeds the hardcoded 200ms timeout under concurrent load."

        - alert: MaaSBackend5xx
          expr: |
            sum(rate(istio_requests_total{source_workload="maas-default-gateway-openshift-default", response_code=~"5.."}[5m])) > 0
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "MaaS backend returning 5xx errors"
            description: "vLLM or backend services are returning server errors at {{ "{{ $value | humanize }}" }} req/s through the MaaS gateway."

        - alert: MaaSGatewayErrorsCritical
          expr: |
            (
              sum(rate(kuadrant_errors[5m]))
              + sum(rate(istio_requests_total{source_workload="maas-default-gateway-openshift-default", response_code=~"5.."}[5m]))
            ) / (
              sum(rate(kuadrant_allowed[5m]))
              + sum(rate(kuadrant_denied[5m]))
              + sum(rate(kuadrant_errors[5m]))
            ) > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "MaaS total error rate exceeds 5%"
            description: "More than 5% of all gateway requests are failing (auth timeouts + backend errors combined)."
{{- end }}
