{{- if .Values.serviceMonitor.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Values.collector.name }}-monitor
  namespace: {{ .Values.collector.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.collector.name }}
spec:
  endpoints:
    - port: prometheus
      interval: 30s
  namespaceSelector:
    matchNames:
      - {{ .Values.collector.namespace }}
  selector:
    matchLabels:
      app.kubernetes.io/managed-by: opentelemetry-operator
      app.kubernetes.io/instance: {{ .Values.collector.namespace }}.{{ .Values.collector.name }}
{{- end }}
